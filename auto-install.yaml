#cloud-config
autoinstall:
  version: 1

  # 1. Creates the localadmin account
  identity:
    hostname: ubuntu-client
    username: localadmin
    # Generate this hash on a Linux machine using: openssl passwd -6
    password: "$6$cNnawFXOpTM748U3$l.04fA7Hn93JjyvBVPYjUy/s/y6dyveC/wAV3QH5uwK9D88442fBnS9jHXFHo5sxml3zL7qCjV7L556Nbjxlo1"

  # 2. Enables unattended-upgrades for all packages
  updates: all

  # 3 & 4. Late Commands to handle UCS and Network Homes
  late-commands:
    # Add the Univention PPA and update apt
    - curtin in-target -- add-apt-repository -y ppa:univention-dev/ppa
    - curtin in-target -- apt-get update

    # Install the UCS domain join tool and PAM mount for network homes
    - curtin in-target -- env DEBIAN_FRONTEND=noninteractive apt-get install -y univention-domain-join sssd-tools libpam-mount cifs-utils nfs-common

    # Execute the UCS Domain Join
    # NOTE: See the security warning below regarding passwords in this command
    - curtin in-target -- univention-domain-join-cli --dc-ip=192.168.100.147 --username=Administrator --password=Treadmill8-Undecided3 --force-ucs-dns

    # Optional: Configure PAM to automatically create local home directory structures if needed
    - curtin in-target -- bash -c "echo 'session optional pam_mkhomedir.so skel=/etc/skel umask=077' >> /etc/pam.d/common-session"
